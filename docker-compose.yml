services:
  otakuevents:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5175
      EVENTNOTE_DATA_DIR: /var/lib/otakuevents/data
    ports:
      - "127.0.0.1:5175:5175"
    volumes:
      - ./data:/var/lib/otakuevents/data
      - ./backups:/var/lib/otakuevents/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5175/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
